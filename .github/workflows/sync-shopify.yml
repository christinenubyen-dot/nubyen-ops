name: Sync Shopify data

on:
  schedule:
    - cron: "0 * * * *" # top of every hour (UTC)
  workflow_dispatch: # manual run from the Actions tab
  push:
    branches: [main] # also rebuild when you push code changes

# Needs to commit data.json AND publish to Pages, so it must build+deploy here.
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch Shopify data
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
        run: node scripts/fetch-shopify.mjs
        continue-on-error: true # if Shopify fails, still deploy last good data

      - name: Commit updated data.json
        run: |
          git config user.name "shopify-sync-bot"
          git config user.email "actions@github.com"
          git add public/data.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: hourly Shopify data sync"
            git push
          fi

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
